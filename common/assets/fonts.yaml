# =============================================================================
# FONTS - Roboto variants for main UI and setup screens
# =============================================================================

font:
  # Main page: large statistics / sensor values
  - file: "gfonts://Roboto@Light"
    id: font_roboto_light_48_digits
    size: 48
    bpp: 4
    glyphs:
      - "0123456789.-°/%"
      - ":"

  # Volume/climate modal: large numeric value
  - file: "gfonts://Roboto@Thin"
    id: font_roboto_thin_96_text
    size: 96
    bpp: 4
    glyphs: !include text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo@Light"
        glyphs: !include hebrew_glyphs.yaml

  # Main page: media now-playing titles (sensor value size, full text glyph coverage)
  - file: "gfonts://Roboto@Light"
    id: font_roboto_light_43_text
    size: 43
    bpp: 4
    glyphs: !include text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo@Light"
        glyphs: !include hebrew_glyphs.yaml

  # Main page: button labels
  - file: "gfonts://Roboto"
    id: font_roboto_regular_22_text
    size: 22
    bpp: 4
    glyphs: !include text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo"
        glyphs: !include hebrew_glyphs.yaml

  # Climate modal option titles: smaller first line above the option value
  - file: "gfonts://Roboto"
    id: font_roboto_regular_20_text
    size: 20
    bpp: 4
    glyphs: !include text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo"
        glyphs: !include hebrew_glyphs.yaml

  # Top bar: clock and temperature
  - file: "gfonts://Roboto"
    id: font_roboto_regular_20_default
    size: 20
    bpp: 4
    extras:
      - file: "gfonts://Heebo"
        glyphs: !include hebrew_glyphs.yaml
