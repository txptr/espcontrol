# =============================================================================
# ESPHOME ENTRY POINT - Tuya T3E Smart Panel
# =============================================================================
# User-facing config file. Set your device name and WiFi credentials here.
# The remote package reference pulls in your custom device configuration from
# YOUR GitHub fork so the device stays up-to-date automatically.
# =============================================================================

# ---------------------------------------------------------------------------
# Device identity
# ---------------------------------------------------------------------------
substitutions:
  name: "tuya-t3e-panel"          # Der interne Name (wichtig für die URL im Netzwerk)
  friendly_name: "Tuya T3E Panel" # Der Name, wie er in Home Assistant angezeigt wird

# ---------------------------------------------------------------------------
# WiFi credentials (stored in secrets.yaml)
# ---------------------------------------------------------------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# ---------------------------------------------------------------------------
# Remote package (pulls full config from YOUR GitHub Fork)
# ---------------------------------------------------------------------------
packages:
  setup:
    url: https://github.com/txptr/espcontrol/
    file: devices/tuya-t3e/packages.yaml
    ref: main                                             # Nutzt den Hauptzweig deines Forks
    refresh: 1s