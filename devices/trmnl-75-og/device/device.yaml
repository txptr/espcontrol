# =============================================================================
# DEVICE - TRMNL 7.5 OG e-paper hardware definition
# =============================================================================

substitutions:
  espcontrol_component_url: "https://github.com/jtenniswood/espcontrol"
  espcontrol_component_ref: "main"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

external_components:
  - source:
      type: git
      url: ${espcontrol_component_url}
      ref: ${espcontrol_component_ref}
      path: components
    components: [espcontrol]
    refresh: 1s

espcontrol:

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    build_flags:
      - "-DESPCONTROL_DISABLE_TODO=1"
  on_boot:
    - priority: 600
      then:
        - lambda: |-
            std::string mac = get_mac_address();
            std::string compact;
            for (char c : mac) {
              if (c != ':' && c != '-') compact.push_back(c);
            }
            std::string suffix = compact.length() > 6 ? compact.substr(compact.length() - 6) : compact;
            if (suffix.empty()) suffix = "SETUP";
            wifi::WiFiAP ap;
            ap.set_ssid("ESP_" + suffix);
            wifi::global_wifi_component->set_ap(ap);
    - priority: -100
      then:
        - lvgl.resume:
        - script.execute: trmnl_sync_dashboard_config
        - if:
            condition:
              lambda: 'return !wifi::global_wifi_component->has_sta();'
            then:
              - lvgl.page.show: trmnl_wifi_setup_page
            else:
              - lvgl.page.show: main_page
        - script.execute: trmnl_start_display_refreshes

logger:

wifi:
  power_save_mode: none
  reboot_timeout: 30min
  ap:
    ap_timeout: 90s
  on_connect:
    - lvgl.page.show: main_page
    - script.execute: trmnl_start_display_refreshes
  on_disconnect:
    - delay: 90s
    - if:
        condition:
          not:
            wifi.connected:
        then:
          - lvgl.page.show: trmnl_wifi_setup_page
          - lambda: |-
              id(epaper).set_full_update_every(1);
          - component.update: epaper
          - lambda: |-
              id(epaper).set_full_update_every(30);

api:
  reboot_timeout: 0s
  homeassistant_states: true
  homeassistant_services: true
  on_client_connected:
    - lambda: |-
        ESP_LOGI("api", "API client connected: %s", client_info.c_str());
        bool is_home_assistant = client_info.find("Home Assistant") != std::string::npos;
        if (is_home_assistant && ha_api_state_connected()) {
          apply_registered_ha_control_availability(true);
          refresh_weather_forecast_cards();
        }
    - delay: 2s
    - script.execute: trmnl_sync_dashboard_config
    - script.execute: trmnl_refresh_display_when_ready
    - delay: 8s
    - lambda: |-
        if (ha_api_state_connected()) refresh_weather_forecast_cards();
    - delay: 20s
    - lambda: |-
        if (ha_api_state_connected()) refresh_weather_forecast_cards();
  on_client_disconnected:
    - lambda: |-
        ESP_LOGW("api", "API client disconnected: %s", client_info.c_str());
        bool is_home_assistant = client_info.find("Home Assistant") != std::string::npos;
        if (!is_home_assistant && ha_api_state_connected()) {
          return;
        }
        weather_forecast_cancel_pending_requests();
        apply_registered_ha_control_availability(false);

ota:
  - platform: esphome

captive_portal:

web_server:
  port: 80
  version: 3
  include_internal: true
  js_url: https://jtenniswood.github.io/espcontrol/webserver/${device_slug}/www.js?v=${firmware_version}&ui=20260530-trmnl
  sorting_groups:
    - id: sg_button
      name: "Dashboard Configuration"
      sorting_weight: 10
    - id: sg_display
      name: "Display Configuration"
      sorting_weight: 20
    - id: sg_firmware
      name: "Firmware"
      sorting_weight: 40

http_request:
  verify_ssl: false

button:
  - platform: template
    name: "Apply Configuration"
    internal: true
    disabled_by_default: true
    icon: mdi:restart
    entity_category: config
    on_press:
      then:
        - lambda: |-
            global_preferences->sync();
            App.safe_reboot();

  - platform: template
    name: "Refresh Display"
    icon: mdi:refresh
    entity_category: config
    web_server:
      sorting_group_id: sg_display
      sorting_weight: 5
    on_press:
      then:
        - lambda: |-
            id(trmnl_display_refresh_enabled) = true;
        - script.execute: trmnl_sync_dashboard_config
        - script.execute: trmnl_refresh_display_full

select:
  - platform: template
    name: "${entity_screen_temperature_unit}"
    internal: true
    disabled_by_default: true
    id: temperature_unit_select
    entity_category: config
    icon: "mdi:temperature-celsius"
    optimistic: true
    restore_value: true
    initial_option: "Auto"
    options:
      - "Auto"
      - "°C"
      - "°F"
    web_server:
      sorting_group_id: sg_display
      sorting_weight: 10
    on_value:
      then:
        - lambda: |-
            set_display_temperature_unit(id(temperature_unit_select).current_option(), "UTC (GMT+0)");
            refresh_temperature_unit_labels();
        - script.execute: trmnl_refresh_display_when_ready

time:
  - platform: sntp
    id: trmnl_time

interval:
  - interval: 5s
    then:
      - lambda: |-
          weather_forecast_cancel_stale_requests();
          weather_forecast_send_next_queued();

  - interval: 1h
    then:
      - lambda: |-
          refresh_weather_forecast_cards();

spi:
  clk_pin: GPIO7
  mosi_pin: GPIO9

globals:
  - id: trmnl_current_page
    type: int
    restore_value: true
    initial_value: "0"
  - id: trmnl_force_full_refresh
    type: bool
    restore_value: false
    initial_value: "false"
  - id: trmnl_display_refresh_enabled
    type: bool
    restore_value: false
    initial_value: "false"

binary_sensor:
  - platform: gpio
    id: trmnl_key_prev
    name: "TRMNL Previous Page"
    internal: true
    pin:
      number: GPIO2
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    on_press:
      then:
        - lambda: |-
            id(trmnl_current_page) = 0;
        - script.execute: trmnl_refresh_display_full

  - platform: gpio
    id: trmnl_key_home
    name: "TRMNL Home Page"
    internal: true
    pin:
      number: GPIO3
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    on_press:
      then:
        - lambda: |-
            id(trmnl_current_page) = 0;
        - script.execute: trmnl_refresh_display_full

  - platform: gpio
    id: trmnl_key_next
    name: "TRMNL Next Page"
    internal: true
    pin:
      number: GPIO5
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    on_press:
      then:
        - lambda: |-
            id(trmnl_current_page) = 0;
        - script.execute: trmnl_refresh_display_full

display:
  - platform: waveshare_epaper
    id: epaper
    model: 7.50inv2p
    cs_pin: GPIO44
    dc_pin: GPIO10
    reset_pin: GPIO38
    busy_pin:
      number: GPIO4
      inverted: true
    update_interval: never
    auto_clear_enabled: false
    full_update_every: 30
    rotation: 0

lvgl:
  id: main_lvgl
  displays: epaper
  buffer_size: 12%
