# =============================================================================
# FONTS - Generic style IDs for the 800x480 monochrome e-paper display
# =============================================================================
# Feature YAML should reference these functional style IDs, not physical font
# names or sizes. Sizes remain device-specific behind the same style names.
# =============================================================================

font:
  # Main action/setup icons
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: font_icon_main
    size: 35
    bpp: 4
    glyphs: !include ../../../common/assets/icon_glyphs.yaml

  # Smaller card icons
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: font_icon_card
    size: 40
    bpp: 4
    glyphs: !include ../../../common/assets/icon_glyphs.yaml

  # Status, network, and subpage icons
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: font_icon_status
    size: 18
    bpp: 4
    glyphs: !include ../../../common/assets/network_status_glyphs.yaml

  # Main labels and setup body text
  - file: "gfonts://Roboto"
    id: font_text_body
    size: 16
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Compact supporting text
  - file: "gfonts://Roboto"
    id: font_text_small
    size: 13
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Card labels
  - file: "gfonts://Roboto"
    id: font_text_card_label
    size: 20
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Sensor unit suffixes inside cards
  - file: "gfonts://Roboto"
    id: font_text_card_unit
    size: 20
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Headings and media titles
  - file: "gfonts://Roboto@Light"
    id: font_text_title
    size: 28
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo@Light"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Clock bar
  - file: "gfonts://Roboto@Light"
    id: font_text_clock_bar
    size: 22
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo@Light"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Now playing track title
  - file: "gfonts://Roboto"
    id: font_text_media_title
    size: 24
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Larger modal/supporting labels
  - file: "gfonts://Roboto"
    id: font_text_large
    size: 23
    bpp: 4
    glyphs:
      - " ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz/°"

  # Normal sensor values
  - file: "gfonts://Roboto@Light"
    id: font_number_value
    size: 42
    bpp: 4
    glyphs:
      - "0123456789.-°/%"
      - ":"

  # Large sensor values
  - file: "gfonts://Roboto@Thin"
    id: font_number_value_large
    size: 82
    bpp: 4
    glyphs:
      - "0123456789.-°/%"
      - ":"

  # Large modal numbers
  - file: "gfonts://Roboto@Thin"
    id: font_number_modal
    size: 90
    bpp: 4
    glyphs:
      - "0123456789.-°/%"
      - ":"
