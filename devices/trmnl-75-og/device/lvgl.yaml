# =============================================================================
# LVGL MAIN PAGE - TRMNL 7.5 OG monochrome e-paper dashboard
# =============================================================================

lvgl:
  top_layer:
    widgets:
      - label:
          text: "-°C / -°C"
          id: temperatures
          text_font: font_text_clock_bar
          align: top_left
          x: 12
          y: 6
          text_color: 0x000000
          hidden: true
      - label:
          text: "--:--"
          id: display_time
          text_font: font_text_clock_bar
          align: top_mid
          y: 6
          text_align: center
          text_color: 0x000000
      - obj:
          id: network_status_button
          align: top_right
          x: -10
          y: 0
          width: 24
          height: 32
          bg_opa: transp
          border_width: 0
          pad_all: 0
          scrollable: false
          clickable: false
          widgets:
            - label:
                id: network_status_icon_label
                text: "\U000F092E"
                text_font: font_icon_status
                align: center
                text_align: center
                text_color: 0x000000
      - slider:
          hidden: true
          width: 0
          height: 0
      - arc:
          hidden: true
          width: 0
          height: 0

  pages:
    - id: main_page
      scrollbar_mode: "off"
      align: top_left
      layout:
        type: grid
        grid_columns: [FR(1), FR(1), FR(1), FR(1)]
        grid_rows: [FR(1), FR(1), FR(1)]
        pad_row: 6
        pad_column: 6
      width: 100%
      bg_color: 0xFFFFFF
      bg_opa: cover
      pad_top: ${main_page_pad_top}
      pad_bottom: ${main_page_pad_edge}
      pad_left: ${main_page_pad_edge}
      pad_right: ${main_page_pad_edge}
      widgets:
        - !include { file: ../../../common/device/button_widget.yaml, vars: { num: "1" } }
        - !include { file: ../../../common/device/button_widget.yaml, vars: { num: "2" } }
        - !include { file: ../../../common/device/button_widget.yaml, vars: { num: "3" } }
        - !include { file: ../../../common/device/button_widget.yaml, vars: { num: "4" } }
        - !include { file: ../../../common/device/button_widget.yaml, vars: { num: "5" } }
        - !include { file: ../../../common/device/button_widget.yaml, vars: { num: "6" } }
        - !include { file: ../../../common/device/button_widget.yaml, vars: { num: "7" } }
        - !include { file: ../../../common/device/button_widget.yaml, vars: { num: "8" } }
        - !include { file: ../../../common/device/button_widget.yaml, vars: { num: "9" } }
        - !include { file: ../../../common/device/button_widget.yaml, vars: { num: "10" } }
        - !include { file: ../../../common/device/button_widget.yaml, vars: { num: "11" } }
        - !include { file: ../../../common/device/button_widget.yaml, vars: { num: "12" } }
