# =============================================================================
# LVGL MAIN PAGE - TRMNL 7.5 OG monochrome e-paper dashboard
# =============================================================================

lvgl:
  top_layer:
    widgets:
      - label:
          text: "-°C / -°C"
          id: temperatures
          text_font: font_trmnl_header_20
          align: top_left
          x: 12
          y: 8
          text_color: 0x000000
          hidden: true
      - label:
          text: "--:--"
          id: display_time
          text_font: font_trmnl_header_20
          align: top_mid
          y: 8
          text_align: center
          text_color: 0x000000
      - obj:
          id: network_status_button
          align: top_right
          x: -12
          y: 3
          width: 30
          height: 30
          bg_opa: transp
          border_width: 0
          pad_all: 0
          scrollable: false
          clickable: false
          widgets:
            - label:
                id: network_status_icon_label
                text: "\U000F0928"
                text_font: font_trmnl_mdi_26_icons
                align: center
                text_align: center
                text_color: 0x000000

  pages:
    - id: trmnl_wifi_setup_page
      scrollbar_mode: "off"
      width: 100%
      bg_color: 0xFFFFFF
      bg_opa: cover
      pad_all: 0
      widgets:
        - obj:
            align: center
            width: 90%
            height: 72%
            bg_color: 0xFFFFFF
            bg_opa: cover
            border_color: 0x000000
            border_width: 2
            radius: 6
            pad_all: 24
            scrollable: false
            clickable: false
            layout:
              type: flex
              flex_flow: COLUMN
              flex_align_main: center
              flex_align_cross: center
              pad_row: 18
            widgets:
              - label:
                  text: "WiFi Setup"
                  text_font: font_trmnl_value_24
                  text_color: 0x000000
                  text_align: center
              - label:
                  text: "Connect to the setup hotspot"
                  text_font: font_trmnl_header_20
                  text_color: 0x000000
                  text_align: center
              - label:
                  text: "ESP setup hotspot"
                  id: trmnl_wifi_setup_ssid
                  text_font: font_trmnl_label_14
                  text_color: 0x000000
                  text_align: center
              - label:
                  text: "Then open 192.168.4.1"
                  text_font: font_trmnl_value_24
                  text_color: 0x000000
                  text_align: center
              - label:
                  text: "After WiFi setup, add this device in Home Assistant."
                  text_font: font_trmnl_label_14
                  text_color: 0x000000
                  text_align: center
              # Hidden widgets ensure LVGL compiles dynamic controls used by
              # the shared card renderer.
              - slider:
                  hidden: true
                  width: 0
                  height: 0
              - arc:
                  hidden: true
                  width: 0
                  height: 0

    - id: main_page
      scrollbar_mode: "off"
      layout:
        type: grid
        grid_columns: [FR(1), FR(1), FR(1), FR(1)]
        grid_rows: [FR(1), FR(1), FR(1)]
        pad_row: 10
        pad_column: 10
      width: 100%
      bg_color: 0xFFFFFF
      bg_opa: cover
      pad_top: 42
      pad_bottom: 5
      pad_left: 5
      pad_right: 5
      widgets:
        - !include { file: trmnl_tile_widget.yaml, vars: { num: "1" } }
        - !include { file: trmnl_tile_widget.yaml, vars: { num: "2" } }
        - !include { file: trmnl_tile_widget.yaml, vars: { num: "3" } }
        - !include { file: trmnl_tile_widget.yaml, vars: { num: "4" } }
        - !include { file: trmnl_tile_widget.yaml, vars: { num: "5" } }
        - !include { file: trmnl_tile_widget.yaml, vars: { num: "6" } }
        - !include { file: trmnl_tile_widget.yaml, vars: { num: "7" } }
        - !include { file: trmnl_tile_widget.yaml, vars: { num: "8" } }
        - !include { file: trmnl_tile_widget.yaml, vars: { num: "9" } }
        - !include { file: trmnl_tile_widget.yaml, vars: { num: "10" } }
        - !include { file: trmnl_tile_widget.yaml, vars: { num: "11" } }
        - !include { file: trmnl_tile_widget.yaml, vars: { num: "12" } }
