# =============================================================================
# BUILD PROFILE - Guition ESP32-S3-4848S040 (4" square)
# =============================================================================
# CI/local build entry point for the 480×480 square ESP32-S3 panel.
# =============================================================================

substitutions:
  name: "espcontrol-4848s040"
  friendly_name: "Guition ESP32-S3-4848S040"
  espcontrol_component_url: "file:///config"
  espcontrol_component_ref: "HEAD"

esphome:
  name_add_mac_suffix: true

packages:
  espcontrol: !include
    file: ../devices/guition-esp32-s3-4848s040/packages.yaml
    vars:
      provisioning_package_suffix: "_deployed"

wifi:
  # Compile-only station credentials for CI/local builds. User-imported
  # deployed configs supply their real WiFi credentials in device YAML.
  ssid: "ESPControl"
  password: "espcontrol"
